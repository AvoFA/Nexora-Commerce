services:
  database:
    image: mongo:latest
    restart: unless-stopped
    ports:
      - "27018:27017"
    volumes:
      - mongo-data:/data/db

  backend:
    build:
      context: ./server
    restart: unless-stopped
    depends_on:
      - database
    ports:
      - "5000:5000"
    environment:
      PORT: 5000
      MONGODB_URI: mongodb://database:27017/eshop-admin
      MONGO_URI: mongodb://database:27017/eshop-admin
      JWT_SECRET: ${JWT_SECRET:-super-secret-key-for-course-work}
      NOVA_POSHTA_API_KEY: ${NOVA_POSHTA_API_KEY:-}

  frontend:
    build:
      context: .
      dockerfile: client/Dockerfile
      args:
        VITE_API_URL: /api
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "80:80"

volumes:
  mongo-data:
